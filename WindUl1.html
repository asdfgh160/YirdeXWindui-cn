<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindUI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: left;
        }

        /* WindUI 彩色文字 */
        h1 {
            font-size: 3rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        h1 span {
            background: linear-gradient(135deg, #00ff87, #60efff, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradient 6s ease infinite;
            display: inline-block;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.5rem;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* 作者信息 */
        .author {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .author a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }

        .author a:hover {
            color: white;
        }

        .qq-number {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主标题 -->
        <h1>使用 <span>WindUI</span><br>创建优美的脚本</h1>
        
        <!-- 描述 -->
        <p>现代化 UI 库。设计简洁，代码开源。</p>
        
        <!-- 按钮 - 修复链接 -->
        <div class="buttons">
            <a href="#" class="btn btn-primary" onclick="alert('个人汉化版文档正在制作中')">中文文档</a>
            <a href="https://footagesus.github.io/WindUI-Docs/docs" target="_blank" class="btn btn-primary">官方Wind文档</a>
            <a href="https://github.com/Footagesus/WindUI" target="_blank" class="btn btn-secondary">官方GitHub</a>
        </div>
    </div>

    <!-- 作者信息 -->
    <div class="author">
        <span>作者：YirdeX</span>
        <span>·</span>
        <a href="https://footagesus.github.io/WindUI-Docs/" target="_blank">个人制作 • 非官方</a>
        <span>·</span>
        <span class="qq-number">QQ: 2137844138</span>
    </div>
</body>
</html>
